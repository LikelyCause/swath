name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Lightweight only — the ML stack (torch/terratorch/GDAL) and model weights
      # are intentionally not installed in CI; these checks cover lint, syntax, and
      # the pure-Python registry. See backend/tests/test_registry.py.
      - run: pip install ruff pytest
      - run: ruff check backend/
      - run: python -m compileall backend/
      - run: pytest
